<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" role="img" aria-labelledby="title desc">
<title id="title">Three-station CMM inspection fixture</title>
<desc id="desc">Web illustration based on Eden Industrial Systems' three-station aluminum inspection fixture with pull knobs and three loaded components.</desc>
<defs>
