    <path d="M335 480l245 95 285-124-252-92z" fill="#1e293b"/>
    <path d="M335 421l245 95 285-124-252-92z" fill="#334155"/>
    <path d="M335 421v59l245 95v-59z" fill="#0f172a"/>
    <path d="M580 516v59l285-124v-59z" fill="#1e293b"/>

    <path d="M438 382l166 64 160-70-170-62z" fill="#2563eb" opacity="0.92"/>
    <path d="M438 382v42l166 64v-42z" fill="#1d4ed8"/>
    <path d="M604 446v42l160-70v-42z" fill="#1e40af"/>

    <circle cx="475" cy="448" r="24" fill="#f8fafc" opacity="0.92"/>
    <circle cx="665" cy="493" r="24" fill="#f8fafc" opacity="0.92"/>
    <circle cx="753" cy="401" r="24" fill="#f8fafc" opacity="0.92"/>
  </g>

  <g fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" opacity="0.85">
